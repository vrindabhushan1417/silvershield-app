
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'SilverShield SG','short_name':'Shield','start_url':'.','display':'standalone','background_color':'#0056b3','theme_color':'#0056b3'}" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>SilverShield SG</title>
    <style>
        :root { --primary: #0056b3; --danger: #d00000; --success: #28a745; --bg: #f4f7f9; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-header { background: var(--primary); color: white; width: 100%; padding: 20px 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #setup-zone, #app-zone { width: 90%; max-width: 380px; background: white; margin-top: 20px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); box-sizing: border-box; }
        #app-zone { display: none; flex-direction: column; align-items: center; margin-top: 40px; }
        .contact-row { display: flex; align-items: center; margin-bottom: 15px; background: #fdfdfd; padding: 8px; border-radius: 12px; border: 1px solid #eee; }
        .contact-input { flex: 1; border: none; background: transparent; padding: 10px; font-size: 16px; outline: none; }
        .save-btn { background: var(--primary); color: white; padding: 18px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
        #sos-btn { width: 220px; height: 220px; background: var(--danger); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 36px; font-weight: 900; border: 10px solid #ffccd5; text-align: center; cursor: pointer; box-shadow: 0 15px 30px rgba(208,0,0,0.2); }
        .btn { width: 100%; padding: 18px; border-radius: 15px; font-size: 20px; font-weight: bold; text-decoration: none; text-align: center; display: block; margin-top: 20px; color: white; }
        .call-btn { background: var(--success); }
        .sms-btn { background: #fd7e14; display: none; }
    </style>
</head>
<body>
    <header class="app-header"><h1>🛡️ SilverShield SG</h1></header>
    <div id="setup-zone">
        <h2>Setup Contacts</h2>
        <div class="contact-row"><input type="tel" class="contact-input" placeholder="Primary Number" id="n1"></div>
        <div class="contact-row"><input type="tel" class="contact-input" placeholder="Family 2" id="n2"></div>
        <div class="contact-row"><input type="tel" class="contact-input" placeholder="Family 3" id="n3"></div>
        <button class="save-btn" onclick="saveContacts()">ACTIVATE NOW</button>
    </div>
    <div id="app-zone">
        <div id="sos-btn" onclick="triggerSOS()">HELP<br>救命</div>
        <a id="call-link" href="#" class="btn call-btn">📞 CALL PRIMARY</a>
        <a id="sms-link" href="#" class="btn sms-btn">📢 ALERT ALL (SMS)</a>
        <p id="status" style="margin-top:20px; font-weight:bold">Status: Secured</p>
    </div>
    <script>
        window.onload = function() {
            const data = localStorage.getItem('sos_contacts');
            if (data) showApp(JSON.parse(data));
        };
        function formatSGNumber(n) {
            let clean = n.replace(/\D/g, ''); 
            if (clean.length === 8) clean = '65' + clean;
            return '+' + clean;
        }
        function saveContacts() {
            const ids = ['n1', 'n2', 'n3'];
            const nums = ids.map(id => document.getElementById(id).value.trim()).filter(n => n.length >= 8);
            if (nums.length === 0) return alert("Enter a number.");
            const formatted = nums.map(formatSGNumber);
            localStorage.setItem('sos_contacts', JSON.stringify(formatted));
            showApp(formatted);
        }
        function showApp(nums) {
            document.getElementById('setup-zone').style.display = 'none';
            document.getElementById('app-zone').style.display = 'flex';
            document.getElementById('call-link').href = "tel:" + nums[0];
        }
        function triggerSOS() {
            document.getElementById('status').innerText = "📍 Locating...";
            navigator.geolocation.getCurrentPosition(function(pos) {
                const mapUrl = "https://www.google.com/maps?q=" + pos.coords.latitude + "," + pos.coords.longitude;
                const message = "EMERGENCY! I need help. My location: " + mapUrl;
                const nums = JSON.parse(localStorage.getItem('sos_contacts'));
                document.getElementById('sms-link').href = "sms:" + nums.join(",") + "?body=" + encodeURIComponent(message);
                document.getElementById('sms-link').style.display = "block";
                document.getElementById('status').innerText = "✅ Location Found";
            });
        }
    </script>
</body>
</html>
