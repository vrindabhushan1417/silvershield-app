
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SilverShield V2</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #0056b3; --danger: #d00000; --whatsapp: #25D366; --bg: #f4f7f9; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-header { background: var(--primary); color: white; width: 100%; padding: 15px 0; text-align: center; font-size: 20px; font-weight: bold; }
        #setup-zone, #app-zone { width: 92%; max-width: 400px; background: white; margin-top: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); box-sizing: border-box; }
        .input-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 5px; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; border: none; color: white; cursor: pointer; text-align: center; text-decoration: none; display: block; margin-top: 10px; }
        .save-btn { background: var(--primary); }
        .wa-btn { background: var(--whatsapp); display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; opacity: 0.5; pointer-events: none; }
        #sos-main { width: 180px; height: 180px; background: var(--danger); border-radius: 50%; border: 8px solid #ffccd5; color: white; font-size: 30px; font-weight: 900; margin: 20px auto; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 0 10px 20px rgba(208,0,0,0.2); cursor: pointer; }
        #status { text-align: center; font-weight: bold; color: #555; margin: 15px 0; min-height: 20px; }
        .reset-link { text-align: center; color: #bbb; text-decoration: underline; font-size: 13px; cursor: pointer; margin-top: 30px; display: block; }
    </style>
</head>
<body>
    <header class="app-header">🛡️ SilverShield V2.0</header>

    <div id="setup-zone">
        <h2 style="text-align:center">Setup Emergency Contacts</h2>
        <p style="font-size:12px; color:#666; text-align:center">Include + and Country Code (e.g. +91 or +65)</p>
        
        <div class="input-group">
            <label>CONTACT 1 (Primary)</label>
            <input type="text" id="name1" placeholder="Name">
            <input type="tel" id="num1" placeholder="+6581234567">
        </div>
        <div class="input-group">
            <label>CONTACT 2</label>
            <input type="text" id="name2" placeholder="Name">
            <input type="tel" id="num2" placeholder="+919876543210">
        </div>
        <div class="input-group">
            <label>CONTACT 3</label>
            <input type="text" id="name3" placeholder="Name">
            <input type="tel" id="num3" placeholder="+6590001111">
        </div>
        <button class="btn save-btn" onclick="handleActivate()">ACTIVATE PROTECTION</button>
    </div>

    <div id="app-zone" style="display:none">
        <div id="sos-main" onclick="startEmergency()">HELP<br>救命</div>
        <div id="status">Ready</div>
        <div id="contact-list"></div>
        <a class="reset-link" onclick="resetApp()">Change Numbers</a>
    </div>

    <script>
        // Check if data exists on load
        window.onload = function() {
            const data = localStorage.getItem('ss_v2_data');
            if (data) {
                showMainScreen(JSON.parse(data));
            }
        };

        function handleActivate() {
            console.log("Activate clicked");
            const contacts = [];
            for(let i=1; i<=3; i++) {
                const n = document.getElementById('name'+i).value.trim();
                const p = document.getElementById('num'+i).value.replace(/\s/g, '').trim();
                if(p.length > 5) {
                    contacts.push({name: n || "Family "+i, phone: p});
                }
            }

            if(contacts.length === 0) {
                alert("Please enter at least one phone number.");
                return;
            }

            localStorage.setItem('ss_v2_data', JSON.stringify(contacts));
            showMainScreen(contacts);
        }

        function showMainScreen(contacts) {
            document.getElementById('setup-zone').style.display = 'none';
            document.getElementById('app-zone').style.display = 'block';
            const list = document.getElementById('contact-list');
            list.innerHTML = ""; // Clear existing
            
            contacts.forEach(c => {
                const a = document.createElement('a');
                a.className = 'btn wa-btn';
                a.id = 'wa-' + c.phone.replace(/\+/g, '');
                a.innerHTML = '💬 WhatsApp ' + c.name;
                a.href = "javascript:void(0)";
                a.onclick = function() { alert("Tap RED button first to get location!"); };
                list.appendChild(a);
            });
        }

        function startEmergency() {
            document.getElementById('status').innerText = "📍 Locating you...";
            document.getElementById('status').style.color = "orange";

            const geoOptions = { enableHighAccuracy: true, timeout: 8000 };

            navigator.geolocation.getCurrentPosition(pos => {
                const mapUrl = "https://www.google.com/maps?q=" + pos.coords.latitude + "," + pos.coords.longitude;
                const msg = encodeURIComponent("🚨 EMERGENCY! I need help. My location: " + mapUrl);
                const contacts = JSON.parse(localStorage.getItem('ss_v2_data'));
                
                contacts.forEach(c => {
                    const btn = document.getElementById('wa-' + c.phone.replace(/\+/g, ''));
                    btn.href = "https://wa.me/" + c.phone.replace(/\+/g, '') + "?text=" + msg;
                    btn.onclick = null;
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                });
                document.getElementById('status').innerText = "✅ Location Ready! Tap a name:";
                document.getElementById('status').style.color = "green";
            }, err => {
                document.getElementById('status').innerText = "❌ GPS Error. Check Permissions.";
                document.getElementById('status').style.color = "red";
                console.error(err);
            }, geoOptions);
        }

        function resetApp() {
            if(confirm("Reset all contacts?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
