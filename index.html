
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SilverShield V3 Global</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #0056b3; --danger: #d00000; --whatsapp: #25D366; --bg: #f4f7f9; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-header { background: var(--primary); color: white; width: 100%; padding: 15px 0; text-align: center; font-weight: bold; }
        #setup-zone, #app-zone { width: 92%; max-width: 400px; background: white; margin-top: 20px; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .input-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; border: none; color: white; cursor: pointer; text-align: center; text-decoration: none; display: block; margin-top: 10px; }
        .save-btn { background: var(--primary); }
        .wa-btn { background: var(--whatsapp); opacity: 0.5; pointer-events: none; }
        #sos-btn { width: 180px; height: 180px; background: var(--danger); border-radius: 50%; border: 8px solid #ffccd5; color: white; font-size: 30px; font-weight: 900; margin: 20px auto; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; }
        #status { text-align: center; font-weight: bold; color: #555; margin: 15px 0; min-height: 24px; }
        .footer-ver { font-size: 10px; color: #ccc; margin-top: 20px; }
    </style>
</head>
<body>
    <header class="app-header">🛡️ SilverShield Global V3.0</header>

    <div id="setup-zone">
        <h2 style="text-align:center">Circle of Care</h2>
        <div class="input-group"><label>CONTACT 1</label><input type="text" id="n1" placeholder="Name"><input type="tel" id="p1" placeholder="+65..."></div>
        <div class="input-group"><label>CONTACT 2</label><input type="text" id="n2" placeholder="Name"><input type="tel" id="p2" placeholder="+91..."></div>
        <div class="input-group"><label>CONTACT 3</label><input type="text" id="n3" placeholder="Name"><input type="tel" id="p3" placeholder="+65..."></div>
        <button class="btn save-btn" onclick="saveData()">ACTIVATE PROTECTION</button>
    </div>

    <div id="app-zone" style="display:none">
        <div id="sos-btn" onclick="getGPS()">HELP<br>救命</div>
        <div id="status">Ready</div>
        <div id="contact-list"></div>
        <a href="javascript:void(0)" onclick="localStorage.clear();location.reload();" style="color:#bbb; font-size:12px; margin-top:20px; display:block; text-align:center;">Reset App</a>
    </div>
    <div class="footer-ver">Build: 3.0.Global.WA</div>

    <script>
        window.onload = function() {
            const saved = localStorage.getItem('ss_v3_final');
            if(saved) renderApp(JSON.parse(saved));
        };

        function saveData() {
            const c = [];
            for(let i=1; i<=3; i++) {
                const name = document.getElementById('n'+i).value;
                const phone = document.getElementById('p'+i).value.replace(/\s/g, '');
                if(phone.length > 5) c.push({name: name || "Family "+i, phone: phone});
            }
            if(c.length === 0) return alert("Please enter at least one number.");
            localStorage.setItem('ss_v3_final', JSON.stringify(c));
            renderApp(c);
        }

        function renderApp(contacts) {
            document.getElementById('setup-zone').style.display = 'none';
            document.getElementById('app-zone').style.display = 'block';
            const list = document.getElementById('contact-list');
            list.innerHTML = "";
            contacts.forEach(c => {
                const a = document.createElement('a');
                a.className = 'btn wa-btn';
                a.id = 'btn-' + c.phone.replace(/\+/g, '');
                a.innerHTML = '💬 Alert ' + c.name;
                list.appendChild(a);
            });
        }

        function getGPS() {
            document.getElementById('status').innerText = "📍 Searching for GPS...";
            document.getElementById('status').style.color = "orange";
            
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                const mapUrl = "https://www.google.com/maps?q=" + lat + "," + lon;
                const msg = encodeURIComponent("🚨 EMERGENCY! I need help. My location: " + mapUrl);
                const contacts = JSON.parse(localStorage.getItem('ss_v3_final'));
                
                contacts.forEach(c => {
                    const btn = document.getElementById('btn-' + c.phone.replace(/\+/g, ''));
                    btn.href = "https://wa.me/" + c.phone.replace(/\+/g, '') + "?text=" + msg;
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                });
                document.getElementById('status').innerText = "✅ Location Found! Tap a Name:";
                document.getElementById('status').style.color = "green";
            }, err => {
                document.getElementById('status').innerText = "❌ GPS Error. Please check Permissions.";
                document.getElementById('status').style.color = "red";
                alert("GPS Error: Please ensure Location is ON in phone settings.");
            }, {enableHighAccuracy: true, timeout: 10000});
        }
    </script>
</body>
</html>
